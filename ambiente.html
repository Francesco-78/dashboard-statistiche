<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ambiente — Statistiche</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <nav class="navbar sticky">
    <div class="logo">StatsHub</div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="economia.html">Economia</a></li>
      <li><a href="tecnologia.html">Tecnologia</a></li>
      <li><a class="active" href="ambiente.html">Ambiente</a></li>
      <li><a href="societa.html">Società</a></li>
    </ul>
    <button id="themeToggle" class="theme-btn">🌙</button>
  </nav>

  <header class="page-header">
    <h1>Ambiente</h1>
    <p>Dati su emissioni, energia rinnovabile e sostenibilità.</p>
  </header>

  <main class="content">

    <div class="card fade-in">
      <h3>Emissioni di CO₂</h3>
      <canvas id="co2Chart"></canvas>
    </div>

    <div class="card fade-in">
      <h3>Quota di energia rinnovabile</h3>
      <canvas id="renewableChart"></canvas>
    </div>

  </main>

  <footer class="footer">
    <div class="footer-left">
      <span class="footer-logo">StatsHub</span>
      <span>Analisi e visualizzazioni di dati.</span>
    </div>
    <div class="footer-right">
      <a href="index.html">Home</a>
      <a href="economia.html">Economia</a>
      <a href="tecnologia.html">Tecnologia</a>
      <a href="ambiente.html">Ambiente</a>
      <a href="societa.html">Società</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="script.js"></script>

  <script>
    new Chart(document.getElementById('co2Chart'), {
      type: 'line',
      data: {
        labels: ['2018','2019','2020','2021','2022','2023'],
        datasets: [{
          label: 'Gt CO₂',
          data: [36, 37, 34, 35, 37, 38],
          borderColor: '#6A8CAF',
          tension: 0.3
        }]
      }
    });

    new Chart(document.getElementById('renewableChart'), {
      type: 'bar',
      data: {
        labels: ['2018','2019','2020','2021','2022','2023'],
        datasets: [{
          label: '% rinnovabile',
          data: [18, 19, 21, 23, 25, 27],
          backgroundColor: '#6A8CAF'
        }]
      }
    });
  </script>

</body>
</html>
